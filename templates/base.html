<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#333333">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}Little Librarian{% endblock %}</title>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('inventory') }}" class="nav-brand">📚 Little Librarian</a>
        <div class="nav-links">
            <a href="{{ url_for('inventory') }}" class="nav-link {% if request.endpoint == 'inventory' %}active{% endif %}">Library</a>
            <a href="{{ url_for('scan') }}" class="nav-link {% if request.endpoint == 'scan' %}active{% endif %}">Scan</a>
            <a href="{{ url_for('history') }}" class="nav-link {% if request.endpoint == 'history' %}active{% endif %}">History</a>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
            <div class="flash">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
        document.addEventListener('click', function(e) {
            var th = e.target.closest('th.sortable');
            if (!th) return;
            var table = th.closest('table');
            var tbody = table.querySelector('tbody');
            var col = parseInt(th.dataset.col);
            var type = th.dataset.sort;
            var asc = !th.classList.contains('sort-asc');
            table.querySelectorAll('th.sortable').forEach(function(h) {
                h.classList.remove('sort-asc', 'sort-desc');
            });
            th.classList.add(asc ? 'sort-asc' : 'sort-desc');
            var rows = Array.from(tbody.querySelectorAll('tr'));
            rows.sort(function(a, b) {
                var aCell = a.cells[col];
                var bCell = b.cells[col];
                var aVal = aCell.dataset.sortValue || aCell.textContent.trim().toLowerCase();
                var bVal = bCell.dataset.sortValue || bCell.textContent.trim().toLowerCase();
                if (type === 'num') {
                    return asc ? (aVal > bVal ? 1 : -1) : (aVal < bVal ? 1 : -1);
                }
                return asc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            });
            rows.forEach(function(row) { tbody.appendChild(row); });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
